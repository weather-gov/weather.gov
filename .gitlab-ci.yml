stages:
  - gather
  - build
  - lint
  - test

# these are available in all the running containers (images and services)
variables:
  POSTGRES_USER: drupal
  POSTGRES_PASSWORD: drupal
  POSTGRES_DB: weathergov

# common config for using Docker in later jobs
.docker-in-docker:
  image: docker:27
  services:
    - name: docker:27-dind
      command: [ "--tls=false" ]
      variables:
        HEALTHCHECK_TCP_PORT: "2375"
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

# common config for building images using a specified Dockerfile in the repo
.build-dependencies-image:
  extends: .docker-in-docker
  script:
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  - docker build -f ${BUILD_CONTEXT}${DOCKERFILE} -t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG $BUILD_CONTEXT
  - docker push $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG

# common config for building images using a Dockerfile passed inline as a variable
.build-image:
  extends: .docker-in-docker
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      cat > Dockerfile.tmp << EOF
      $DOCKERFILE
      EOF
    - cat Dockerfile.tmp
    - docker build -f Dockerfile.tmp -t $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG $BUILD_CONTEXT
    - docker push $CI_REGISTRY_IMAGE/$IMAGE_NAME:$IMAGE_TAG

# build a base image with all the current node_modules and other JavaScript dependencies
gather-forecast-node-dependencies:
  extends: .build-dependencies-image
  stage: gather
  variables:
    BUILD_CONTEXT: ./
    DOCKERFILE: Dockerfile.node.ci
    IMAGE_NAME: utility-node
    IMAGE_TAG: main
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_SLUG == "main"
      changes:
        - Dockerfile.node.ci
        - package.json
        - package-lock.json
        - api-interop-layer/package.json
        - api-interop-layer/package-lock.json
        - tests/api/package.json
        - tests/api/package-lock.json
        - spatial-data/package.json
        - spatial-data/package-lock.json

# build a base image with all the current Python dependencies
gather-forecast-django-dependencies:
  extends: .build-dependencies-image
  stage: gather
  variables:
    BUILD_CONTEXT: forecast/
    DOCKERFILE: Dockerfile.ci
    IMAGE_NAME: utility-python
    IMAGE_TAG: main
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_SLUG == "main"
      changes:
        - forecast/Dockerfile.ci
        - forecast/backend/requirements.txt

# build an image containing the latest Django code from our repository
build-forecast-django-image:
  extends: .build-image
  stage: build
  variables:
    BUILD_CONTEXT: forecast/
    DOCKERFILE: |-
      FROM $CI_REGISTRY_IMAGE/utility-python:main
      COPY . /code/
      CMD python manage.py runserver 0.0.0.0:8080
    IMAGE_NAME: web
    IMAGE_TAG: $CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - forecast/backend/**/*

# lint all JavaScript in the repo in one job
js-lint:
  stage: lint
  image: $CI_REGISTRY_IMAGE/utility-node:main
  script:
    # NB: GitLab clones into CI_BUILDS_DIR which defaults to
    # /builds/gitlab-licensed/NWS/Systems/DIS/Weather.gov-2.0/ whereas in our Docker
    # images our WORKDIR is /app. so we symlink the various /app/node_modules to
    # CI_BUILDS_DIR so we can "npm run" as needed.
    - ln -s /app/node_modules/ .
    - ln -s /app/api-interop-layer/node_modules api-interop-layer/
    - ln -s /app/tests/api/node_modules tests/api/
    - npm run js-lint

django-lint:
  stage: lint
  image: $CI_REGISTRY_IMAGE/web:$CI_COMMIT_REF_SLUG
  script:
    - cd /code
    - python -m flake8 .

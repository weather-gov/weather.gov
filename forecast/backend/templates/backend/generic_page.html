{% extends "weather/page.html" %}
{% comment %}
-- Template purpose:
--   Display any CMS page which doesn't have a specific page template.
{% endcomment %}
{% load wagtailcore_tags %}
{% block page_content %}
  <div class="generic-page-container grid-container margin-top-2 margin-bottom-8 desktop:margin-bottom-10">
    <div class="grid-row">
      <div class="grid-col usa-prose">
        <h1>{{ page.title }}</h1>
        {{ page.body | richtext }}
      </div>
    </div>
  </div>
{% endblock %}

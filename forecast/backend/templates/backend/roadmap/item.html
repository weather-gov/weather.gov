<div class="{% if forloop.first %}tablet:border-top tablet:border-base-lighter margin-top-3 tablet:margin-top-0 tablet:padding-top-2{% else %}border-top border-base-lighter margin-top-2 padding-top-2{% endif %}">
  <h3 class="text-primary-dark font-sans-md text-normal margin-top-0">{{ entry.name }}</h3>
  <p class="margin-0">{{ entry.description }}</p>
  <p class="margin-0 margin-top-105">
    <span class="text-accent-warm-darker text-bold">Outcome</span>: {{ entry.outcome }}
  </p>
  {% if forloop.last %}<div id="{{ target }}"></div>{% endif %}
</div>

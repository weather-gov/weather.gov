{% comment %}
-- Template purpose:
--   List all weather forecast offices (WFOs). This is a debugging page.
-- Url: http://localhost:8080/offices/
{% endcomment %}
{% for region in regions %}
  <h1>{{ region.name }}</h1>
  {% for wfo in region.wfos %}
    <h2>
      {{ wfo.name }} (<a href="/offices/{{ wfo.id|lower }}">{{ wfo.id }}</a>)
    </h2>
  {% endfor %}
{% endfor %}

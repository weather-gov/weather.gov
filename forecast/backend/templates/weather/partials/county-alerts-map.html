<wx-alert-map class="display-block wx-county-alert-map-container wx-isolation-isolate">
  <div id="wx_county_alert_map" class="height-full"></div>
  <div class="wx_alert_map_legend display-flex flex-wrap flex-align-center">
    <div class="display-flex flex-no-wrap flex-align-center">
      <div class="wx_alert_map_legend--warning display-block width-3 height-3 border-2px margin-top-105 margin-right-1"></div>
      <span class="text-no-wrap margin-top-105 margin-right-205">{{ "alerts.legend.warning-area.01" | t }}</span>
    </div>
    <div class="display-flex flex-no-wrap flex-align-center">
      <div class="wx_alert_map_legend--watch display-block width-3 height-3 border-2px margin-top-105 margin-right-1"></div>
      <span class="text-no-wrap margin-top-105 margin-right-205">{{ "alerts.legend.watch-area.01" | t }}</span>
    </div>
    <div class="display-flex flex-no-wrap flex-align-center">
      <div class="wx_alert_map_legend--advisory display-block width-3 height-3 border-2px margin-top-105 margin-right-1"></div>
      <span class="text-no-wrap margin-top-105 margin-right-205">{{ "alerts.legend.advisory-area.01" | t }}</span>
    </div>
    <div class="display-flex flex-no-wrap flex-align-center">
      <div class="wx_alert_map_legend--county display-block width-3 height-0 border-2px margin-top-105 margin-right-1"></div>
      <span class="text-no-wrap margin-top-105 margin-right-205">{{ "alerts.legend.county-line.01" | t }}</span>
    </div>
  </div>
</wx-alert-map>

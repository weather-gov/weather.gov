{% comment %}
-- Template purpose:
--   Display the navigation bar on the "7 Days" tab which links to each day.
-- Used by: partials/forecast.html
{% endcomment %}
<nav class="wx-quick-forecast grid-col-12 margin-bottom-2"
     aria-label="{{'daily forecast tab navigation'}}">
  {% for day in days %}
    {% quick_forecast_link_item day=day first=forloop.first %}
  {% endfor %}
</nav>

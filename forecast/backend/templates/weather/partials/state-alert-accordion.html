{% comment %}
-- Template purpose:
--    Blueprint for merged state alerts. Populated by state-alerts-handler.js.
{% endcomment %}
<template id="state-alert-template">
  <div class="wx-state-alert padding-x-3 padding-y-2 margin-bottom-2">
    <h4 class="alert-event-title margin-0 display-flex flex-align-center">
      <div class="maxw-3 height-3 margin-right-1">
        <svg role="img"
             aria-hidden="true"
             class="width-full height-full"
             fill="currentColor">
          <use href="{% static 'images/uswds/sprite.svg' %}#warning" class="js-alert-icon-use"></use>
        </svg>
      </div>
      <span class="js-event-name margin-top-1px"></span>
    </h4>
    <div class="alert-count-subtext js-count-display margin-top-1"></div>
    <button type="button"
            class="usa-button usa-button--unstyled js-list-toggle display-none margin-top-1 text-primary display-flex flex-align-center"
            aria-expanded="false">
      <div class="maxw-3 height-3">
        <svg role="img"
             aria-hidden="true"
             class="width-full height-full"
             fill="currentColor">
          <use href="{% static 'images/uswds/sprite.svg' %}#add_circle" class="js-toggle-icon"></use>
        </svg>
      </div>
      <span class="js-toggle-text margin-top-2px">Expand Counties</span>
    </button>
    <div class="js-collapsible-container margin-top-1">
      <div class="county-column-grid">
        <ul class="js-county-list margin-0">
        </ul>
      </div>
    </div>
  </div>
  <template id="county-link-template">
    <li>
      <a href="" class="usa-link js-county-link">
        <span class="js-county-name"></span>
        <span class="js-subdivision-label"></span>,
        <span class="js-state-code"></span>
      </a>
    </li>
  </template>
</template>
